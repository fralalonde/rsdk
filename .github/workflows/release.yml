name: Build and Release for Windows, Debian, and macOS

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0, v2.1.3, etc.

env:
  release_version: ${{ github.ref_name }}

jobs:
  build-rsdk:
    strategy:
      fail-fast: false
      matrix:
        config:
          - runs-on: windows-2022
            os: windows
            arch: x86_64
            rust_target: x86_64-pc-windows-msvc
          - runs-on: ubuntu-22.04
            os: linux
            arch: x86_64
            rust_target: x86_64-unknown-linux-gnu
          - runs-on: macos-14
            os: mac
            arch: aarch64
            rust_target: aarch64-apple-darwin

    runs-on: ${{ matrix.config.runs-on }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.config.rust_target }}
          toolchain: stable

      - name: Use Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build the project
        run: |
          cargo build --release

      - name: Package for Windows
        if: ${{ matrix.config.os == 'windows' }}
        run: |
          $ReleaseDir = "release"
          New-Item -ItemType Directory -Force -Path $ReleaseDir
          $PowershellSource = "templates\powershell"
          $PowershellDest = "$ReleaseDir\powershell"
          & build\windows\Module-Template.ps1 -SourceDir $PowershellSource -DestinationDir $PowershellDest -ExePath "rsdk.exe"
          Copy-Item "target\release\rsdk.exe" "$ReleaseDir\rsdk.exe"
          $ArchiveName = "rsdk-${{ env.release_version }}-${{ matrix.config.rust_target }}.zip"
          Compress-Archive -Path "$ReleaseDir\*" -DestinationPath $ArchiveName
          Write-Host "Created $ArchiveName"
        shell: pwsh

      - name: Package for Unix
        if: ${{ matrix.config.os == 'linux' || matrix.config.os == 'mac' }}
        run: |
          set -e
          RELEASE_DIR="release"
          mkdir -p "$RELEASE_DIR"
          
          # Generate shell wrappers
          bash build/unix/generate-plugin.sh templates/bash "$RELEASE_DIR/bash" rsdk
          bash build/unix/generate-plugin.sh templates/fish "$RELEASE_DIR/fish" rsdk
          bash build/unix/generate-plugin.sh templates/zsh "$RELEASE_DIR/zsh" rsdk 2>/dev/null || true
          
          # Generate PowerShell module (pwsh on Linux/macOS)
          mkdir -p "$RELEASE_DIR/powershell"
          sed 's|PUT_RSDK_PATH_HERE|rsdk|g' templates/powershell/Rsdk.psm1 > "$RELEASE_DIR/powershell/Rsdk.psm1"
          
          # Copy binary
          cp target/release/rsdk "$RELEASE_DIR/rsdk"
          
          # Create tarball
          ARCHIVE_NAME="rsdk-${{ env.release_version }}-${{ matrix.config.rust_target }}.tar.gz"
          tar -czf "$ARCHIVE_NAME" -C "$RELEASE_DIR" .
          echo "Created $ARCHIVE_NAME"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rsdk-${{ matrix.config.os }}-${{ matrix.config.arch }}-${{ github.ref_name }}
          path: |
            rsdk-*.zip
            rsdk-*.tar.gz

  release:
    name: Create Release
    needs: build-rsdk
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Prepare installer scripts
        run: |
          cp scripts/install.sh artifacts/install.sh
          cp scripts/install.ps1 artifacts/install.ps1

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
            artifacts/install.sh
            artifacts/install.ps1
          generate_release_notes: true
          draft: false
          prerelease: false

